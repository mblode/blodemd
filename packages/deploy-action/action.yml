name: Blode Docs Deploy
description: Deploy docs to blodemd

inputs:
  api-key:
    description: API key
    required: true
  api-url:
    description: API base URL
    required: false
  branch:
    description: Git branch name
    required: false
  commit-message:
    description: Deploy message
    required: false
  directory:
    description: Docs directory
    required: false
  project:
    description: Project slug (reads from docs.json name if omitted)
    required: false

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Push docs
      shell: bash
      env:
        BLODE_DOCS_API_KEY: ${{ inputs.api-key }}
        BLODE_DOCS_API_URL: ${{ inputs.api-url }}
        BLODE_DOCS_BRANCH: ${{ inputs.branch }}
        BLODE_DOCS_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        BLODE_DOCS_PROJECT: ${{ inputs.project }}
      run: npx --yes blodemd push ${{ inputs.directory }}
