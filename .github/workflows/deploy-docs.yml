name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsdown --clean
        working-directory: apps/cli
      - name: Deploy docs
        run: node apps/cli/dist/cli.mjs push apps/docs/content/docs
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
