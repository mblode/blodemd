name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx turbo run build --filter=@repo/common --filter=@repo/previewing
      - run: npx tsdown --clean
        working-directory: apps/cli
      # Dogfood: push the docs content to the blodemd platform via the CLI. It
      # authenticates with BLODEMD_API_KEY, which the API accepts as its admin
      # token (x-admin-token); the repo secret must equal the API's
      # ADMIN_API_TOKEN env var.
      - name: Deploy docs
        run: node apps/cli/dist/cli.mjs push apps/docs/content/docs --project docs
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
