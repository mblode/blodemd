name: DB push

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @repo/db run db:push:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
