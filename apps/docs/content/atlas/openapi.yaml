openapi: 3.0.3
info:
  title: Atlas API
  version: 1.0.0
  description: Manage Atlas projects, deployments, and domains.
servers:
  - url: https://api.atlas.example
paths:
  /projects:
    get:
      summary: List projects
      description: Returns all projects the user can access.
      tags: [Projects]
      responses:
        "200":
          description: OK
    post:
      summary: Create a project
      description: Create a new documentation project.
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        "201":
          description: Created
  /projects/{projectId}:
    get:
      summary: Get project
      description: Fetch a project by ID.
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    patch:
      summary: Update project
      description: Update the project's settings.
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        "200":
          description: OK
  /deployments:
    get:
      summary: List deployments
      tags: [Deployments]
      responses:
        "200":
          description: OK
